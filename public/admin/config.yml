# Decap CMS Configuration
# Deployed on Netlify with Git Gateway authentication
# Docs: https://decapcms.org/docs/configuration-options/

backend:
  name: git-gateway
  branch: main
  commit_messages:
    create: "Create {{collection}} “{{slug}}”"
    update: "Update {{collection}} “{{slug}}”"
    delete: "Delete {{collection}} “{{slug}}”"
    uploadMedia: "Upload “{{path}}”"
    deleteMedia: "Delete “{{path}}”"

# When using the default proxy server for local development
local_backend: true

media_folder: src/assets
public_folder: /src/assets

i18n:
  structure: multiple_folders
  locales: [en]
  default_locale: en

collections:
  - name: blog
    label: Blog Posts
    label_singular: Blog Post
    folder: src/content/blog/en
    create: true
    delete: true
    format: frontmatter
    extension: mdx
    i18n: true
    slug: "{{slug}}"
    preview_path: "blog/{{slug}}"
    sortable_fields: [publishedAt, title, featured]
    view_filters:
      - label: Drafts
        field: draft
        pattern: true
      - label: Published
        field: draft
        pattern: false
      - label: Featured
        field: featured
        pattern: true
    fields:
      - label: Title
        name: title
        widget: string
        i18n: true
        required: true
        pattern: ['.{1,100}', "Title must be 100 characters or less"]
      - label: Description
        name: description
        widget: text
        i18n: true
        required: true
        pattern: ['.{1,200}', "Description must be 200 characters or less"]
      - label: Publish Date
        name: publishedAt
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        required: true
      - label: Updated Date
        name: updatedAt
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        required: false
      - label: Author
        name: author
        widget: string
        default: Team
        required: true
      - label: Featured Image
        name: image
        widget: image
        required: false
      - label: Image Alt Text
        name: imageAlt
        widget: string
        required: false
      - label: Tags
        name: tags
        widget: list
        default: []
      - label: SVG Slug
        name: svgSlug
        widget: string
        required: false
      - label: Draft
        name: draft
        widget: boolean
        default: false
        required: false
      - label: Featured
        name: featured
        widget: boolean
        default: false
        required: false
      - label: Locale
        name: locale
        widget: select
        options: [en, es, fr]
        default: en
        required: true
      - label: Body
        name: body
        widget: markdown
        i18n: true
        required: false

  - name: projects
    label: Projects
    label_singular: Project
    folder: src/content/projects
    create: true
    delete: true
    format: frontmatter
    extension: mdx
    slug: "{{slug}}"
    preview_path: "projects/{{slug}}"
    sortable_fields: [order, title, year]
    fields:
      - label: Title
        name: title
        widget: string
        required: true
      - label: Description
        name: description
        widget: text
        required: true
      - label: Project URL
        name: url
        widget: string
        required: false
      - label: Repository URL
        name: repo
        widget: string
        required: false
      - label: Image
        name: image
        widget: image
        required: false
      - label: Image Alt Text
        name: imageAlt
        widget: string
        required: false
      - label: Tags
        name: tags
        widget: list
        default: []
      - label: Featured
        name: featured
        widget: boolean
        default: false
      - label: Order
        name: order
        widget: number
        default: 99
        value_type: int
      - label: Year
        name: year
        widget: number
        value_type: int
        required: false
      - label: Client
        name: client
        widget: string
        required: false
      - label: Role
        name: role
        widget: string
        required: false
      - label: Services
        name: services
        widget: list
        default: []
      - label: Draft
        name: draft
        widget: boolean
        default: false
      - label: Placeholder
        name: placeholder
        widget: boolean
        default: false
      - label: Body
        name: body
        widget: markdown
        required: false

  - name: authors
    label: Authors
    label_singular: Author
    folder: src/content/authors
    create: true
    delete: true
    format: json
    extension: json
    slug: "{{slug}}"
    fields:
      - label: Name
        name: name
        widget: string
        required: true
      - label: Bio
        name: bio
        widget: text
        required: true
      - label: Avatar
        name: avatar
        widget: image
        required: false
      - label: Social Links
        name: social
        widget: object
        required: false
        fields:
          - label: Twitter
            name: twitter
            widget: string
            required: false
          - label: GitHub
            name: github
            widget: string
            required: false
          - label: LinkedIn
            name: linkedin
            widget: string
            required: false

  - name: faqs
    label: FAQs
    label_singular: FAQ
    folder: src/content/faqs
    create: true
    delete: true
    format: json
    extension: json
    slug: "{{slug}}"
    fields:
      - label: Question
        name: question
        widget: string
        required: true
      - label: Answer
        name: answer
        widget: text
        required: true
      - label: Category
        name: category
        widget: string
        required: false
      - label: Order
        name: order
        widget: number
        default: 0
        value_type: int
      - label: Locale
        name: locale
        widget: select
        options: [en, es, fr]
        default: en

  - name: stack
    label: Tech Stack
    label_singular: Stack Item
    folder: src/content/stack
    create: true
    delete: true
    format: frontmatter
    extension: mdx
    slug: "{{slug}}"
    fields:
      - label: Name
        name: name
        widget: string
        required: true
      - label: Description
        name: description
        widget: text
        required: true
      - label: Version
        name: version
        widget: string
        required: true
      - label: URL
        name: url
        widget: string
        required: true
      - label: Icon
        name: icon
        widget: string
        required: true
        hint: "Icon name, e.g. 'brand-astro'"
      - label: Color (OKLCH)
        name: colorOklch
        widget: string
        required: true
        hint: "OKLCH params, e.g. '62.5% 0.22 38'"
      - label: Order
        name: order
        widget: number
        default: 0
        value_type: int
      - label: Body
        name: body
        widget: markdown
        required: false

  - name: pages
    label: Pages
    label_singular: Page
    folder: src/content/pages
    create: true
    delete: true
    format: frontmatter
    extension: mdx
    slug: "{{slug}}"
    fields:
      - label: Title
        name: title
        widget: string
        required: true
      - label: Description
        name: description
        widget: text
        required: true
      - label: Updated Date
        name: updatedAt
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        required: false
      - label: Locale
        name: locale
        widget: select
        options: [en, es, fr]
        default: en
      - label: Body
        name: body
        widget: markdown
        required: false
