<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#111827"/>

  <!-- Logo mark -->
  <rect x="532.5" y="120" width="135" height="135" rx="28" fill="#f97316"/>
  <text x="600" y="200" text-anchor="middle" dominant-baseline="central"
    fill="white" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-weight="700" font-size="86">7</text>

  <!-- Wordmark -->
  <text x="600" y="380" font-size="96" text-anchor="middle" letter-spacing="-4"
        fill="#f9fafb"
        font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-weight="800">701</text>
  <text x="686" y="354" font-size="72" text-anchor="middle"
        fill="#f97316"
        font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-weight="400">am</text>

  <!-- Divider -->
  <line x1="380" y1="418" x2="820" y2="418" stroke="#374151" stroke-width="1"/>

  <!-- Domain pill -->
  <rect x="450" y="448" width="300" height="38" rx="19"
        fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="600" y="472" font-size="13" text-anchor="middle" letter-spacing="1.5"
        fill="#9ca3af"
        font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">701am.com</text>

  <!-- Corner marks -->
  <path d="M 36 60 L 36 36 L 60 36"     stroke="#374151" stroke-width="1.5" fill="none"/>
  <path d="M 1140 36 L 1164 36 L 1164 60"   stroke="#374151" stroke-width="1.5" fill="none"/>
  <path d="M 36 570 L 36 594 L 60 594"   stroke="#374151" stroke-width="1.5" fill="none"/>
  <path d="M 1140 594 L 1164 594 L 1164 570" stroke="#374151" stroke-width="1.5" fill="none"/>
</svg>
